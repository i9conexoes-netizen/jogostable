<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Banner Inove</title>
    <style>
        body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; background: #1a1a1a; color: white; }
        .controls { width: 300px; display: flex; flex-direction: column; gap: 10px; }
        canvas { border: 2px solid #555; max-width: 500px; height: auto; }
        input, select, button { padding: 10px; border-radius: 5px; border: none; }
        button { background: #25d366; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <h2>Configurar Banner</h2>
    <label>Modelo:</label>
    <select id="modelo" onchange="renderizar()">
        <option value="https://i.imgur.com/8Y3X4vC.jpg">Modelo Dark Purple</option>
        <option value="https://i.imgur.com/your_other_bg.jpg">Modelo Red Fire</option>
    </select>

    <input type="text" id="plano" placeholder="Ex: PLANO MENSAL" oninput="renderizar()">
    <input type="text" id="preco" placeholder="Ex: 29,90" oninput="renderizar()">
    <input type="text" id="whatsapp" placeholder="Seu WhatsApp" oninput="renderizar()">
    
    <label>Sua Logo (PNG):</label>
    <input type="file" id="logoInput" accept="image/*" onchange="renderizar()">

    <button onclick="baixarBanner()">Baixar Banner</button>
</div>

<canvas id="bannerCanvas" width="1080" height="1350"></canvas>

<script>
    const canvas = document.getElementById('bannerCanvas');
    const ctx = canvas.getContext('2d');

    function renderizar() {
        const imgFundo = new Image();
        imgFundo.crossOrigin = "anonymous";
        imgFundo.src = document.getElementById('modelo').value;

        imgFundo.onload = function() {
            // 1. Desenha o Fundo
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgFundo, 0, 0, canvas.width, canvas.height);

            // 2. Estilo do Texto
            ctx.fillStyle = "white";
            ctx.textAlign = "center";

            // Desenhar Plano
            ctx.font = "bold 50px Arial";
            ctx.fillText(document.getElementById('plano').value.toUpperCase(), 540, 900);

            // Desenhar Preço
            ctx.fillStyle = "#ff00ff"; // Cor rosa/neon
            ctx.font = "bold 180px Arial";
            ctx.fillText("R$ " + document.getElementById('preco').value, 540, 1100);

            // Desenhar WhatsApp
            ctx.fillStyle = "white";
            ctx.font = "bold 40px Arial";
            ctx.fillText("Assine via WhatsApp: " + document.getElementById('whatsapp').value, 540, 1250);

            // 3. Desenhar Logo (se houver)
            const logoFile = document.getElementById('logoInput').files[0];
            if (logoFile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const logoImg = new Image();
                    logoImg.onload = function() {
                        ctx.drawImage(logoImg, 440, 100, 200, 200); // Posição da logo
                    }
                    logoImg.src = event.target.result;
                };
                reader.readAsDataURL(logoFile);
            }
        };
    }

    function baixarBanner() {
        const link = document.createElement('a');
        link.download = 'meu-banner-inove.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    // Inicializa
    window.onload = renderizar;
</script>

</body>
</html>
