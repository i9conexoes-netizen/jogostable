<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inove | Central de Solicitações</title>
    <style>
        /* Design VIP Dark Inove */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            background-color: #141414;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            width: 100%;
            max-width: 400px;
            border: 1px solid #222;
        }

        .history-card {
            background-color: #141414;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            max-height: 550px;
            border: 1px solid #222;
            overflow-y: auto;
        }

        h2, h3 {
            text-align: center;
            color: #e50914;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 15px; position: relative; }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #999;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #1a1a1a;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: #e50914; }

        #sugestoes {
            position: absolute;
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .sugestao-item {
            display: flex;
            align-items: center;
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        .sugestao-item:hover { background: #252525; }

        .sugestao-item img { width: 35px; height: 50px; margin-right: 10px; border-radius: 4px; }

        button {
            width: 100%;
            padding: 15px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #b20710; }

        #status { text-align: center; margin-top: 15px; font-weight: bold; }

        .history-item {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #e50914;
            font-size: 13px;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>CENTRAL INOVE</h2>
    
    <form id="formInove">
        <div class="form-group">
            <label>Tipo de Solicitação:</label>
            <select id="tipo">
                <option value="PEDIDO">Novo Pedido 🍿</option>
                <option value="CORRECAO">Informar Correção ⚠️</option>
            </select>
        </div>

        <div class="form-group">
            <label>Categoria:</label>
            <select id="categoria">
                <option value="FILME">Filmes</option>
                <option value="SÉRIE">Séries</option>
                <option value="CANAIS">Canais</option>
            </select>
        </div>

        <div class="form-group">
            <label>Seu Usuário do Painel:</label>
            <input type="text" id="revendedor" placeholder="Usuario" required>
        </div>

        <div class="form-group">
            <label>Título do Conteúdo:</label>
            <input type="text" id="titulo" placeholder="Digite o nome..." autocomplete="off" required>
            <div id="sugestoes"></div>
        </div>

        <div class="form-group">
            <label id="labelObs">Observação / Motivo:</label>
            <textarea id="obs" rows="2" placeholder="Dublado, Temporada X, Link off..."></textarea>
        </div>

        <button type="submit" id="btnEnviar">ENVIAR AGORA</button>
        <div id="status"></div>
    </form>
</div>

<div class="history-card">
    <h3>Histórico Local</h3>
    <div id="listaHistorico"></div>
</div>

<script>
    const TMDB_KEY = "fe9f67e134ddc97742f522aace9f85bb"; 
    const WEBHOOK_PEDIDOS = "https://discord.com/api/webhooks/1494100608146215062/9Jwv_VlY6ILjy-ZfOvWGY0R90SfPAGshm6zuA73QEH28IOSqYi0O_EyJmu1h_BnEnAIL";
    const WEBHOOK_CORRECOES = "https://discord.com/api/webhooks/1494102409935323278/BW8aSu33mUWlNA6t0IROx2ihy5Nrqy4UW6vYjfTMQYy_2D4Dg_AE3KKFU5f7rrSMGgfd";

    const form = document.getElementById('formInove');
    const inputTitulo = document.getElementById('titulo');
    const divSugestoes = document.getElementById('sugestoes');

    // Busca sugestões no TMDB
    inputTitulo.addEventListener('input', async () => {
        const query = inputTitulo.value;
        const cat = document.getElementById('categoria').value;
        if (query.length < 3 || cat === "CANAIS") return divSugestoes.style.display = 'none';

        const tipoBusca = cat === "SÉRIE" ? "tv" : "movie";
        const url = `https://api.themoviedb.org/3/search/${tipoBusca}?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            divSugestoes.innerHTML = "";
            if (data.results?.length > 0) {
                divSugestoes.style.display = 'block';
                data.results.slice(0, 5).forEach(item => {
                    const nome = item.title || item.name;
                    const div = document.createElement('div');
                    div.className = "sugestao-item";
                    div.innerHTML = `<div><strong>${nome}</strong></div>`;
                    div.onclick = () => {
                        inputTitulo.value = nome;
                        divSugestoes.style.display = 'none';
                    };
                    divSugestoes.appendChild(div);
                });
            }
        } catch (e) { }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnEnviar');
        
        const tipo = document.getElementById('tipo').value;
        const categoria = document.getElementById('categoria').value;
        const nome = inputTitulo.value;
        const obs = document.getElementById('obs').value;
        const rev = document.getElementById('revendedor').value;

        btn.disabled = true;
        status.innerText = "Enviando...";

        // MONTAGEM DA MENSAGEM EXATAMENTE COMO VOCÊ PEDIU
        let mensagemFormatada = "";

        if (tipo === "PEDIDO") {
            if (categoria === "SÉRIE") {
                mensagemFormatada = `*PEDIDO DE ADIÇÃO DE CONTEÚDO*\n\nCATEGORIA : SÉRIE\nNOME : ${nome}\nUSUÁRIO: ${rev}\nOBS: ${obs}`;
            } else {
                mensagemFormatada = `*PEDIDO DE ADIÇÃO DE CONTEÚDO*\n\nCATEGORIA : ${categoria}\nNOME : ${nome}\nUSUÁRIO: ${rev}\nOBS: ${obs}`;
            }
        } else {
            // CORREÇÃO
            if (categoria === "SÉRIE") {
                mensagemFormatada = `*PEDIDO DE CORREÇÃO*\n\nCATEGORIA : SÉRIE\nNOME : ${nome}\nTEMPORADA: (Ver Obs)\nMOTIVO: ${obs}\nUSUÁRIO: ${rev}`;
            } else {
                mensagemFormatada = `*PEDIDO DE CORREÇÃO*\n\nCATEGORIA : ${categoria}\nNOME : ${nome}\nMOTIVO: ${obs}\nUSUÁRIO: ${rev}`;
            }
        }

        const urlFinal = (tipo === "PEDIDO") ? WEBHOOK_PEDIDOS : WEBHOOK_CORRECOES;

        try {
            await fetch(urlFinal, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: mensagemFormatada })
            });

            status.style.color = "#00ff00";
            status.innerText = "✅ Enviado com sucesso!";
            
            // Salva no histórico local
            let hist = JSON.parse(localStorage.getItem('hist_inove')) || [];
            hist.push({ txt: nome, date: new Date().toLocaleString() });
            localStorage.setItem('hist_inove', JSON.stringify(hist.slice(-5)));
            
            form.reset();
            renderHist();
        } catch (err) {
            status.style.color = "#ff4444";
            status.innerText = "❌ Erro ao enviar.";
        } finally {
            btn.disabled = false;
        }
    });

    function renderHist() {
        const lista = document.getElementById('listaHistorico');
        const hist = JSON.parse(localStorage.getItem('hist_inove')) || [];
        lista.innerHTML = hist.map(i => `<div class="history-item"><strong>${i.txt}</strong><br><small>${i.date}</small></div>`).join('');
    }
    renderHist();
</script>

</body>
</html>
