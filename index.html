<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inove Play | Guia de Jogos</title>
    <style>
        :root { --primary: #e50914; --bg: #0b0b0b; --card: #141414; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        h1 { color: var(--primary); text-transform: uppercase; text-align: center; letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; font-size: 12px; margin-bottom: 30px; }
        
        .jogo-card { 
            background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px;
            border: 1px solid #222; position: relative; overflow: hidden;
        }
        .jogo-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        
        .confronto { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .time { flex: 1; text-align: center; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        .vs { padding: 0 10px; color: var(--primary); font-weight: 900; font-size: 12px; opacity: 0.7; }
        
        .detalhes { display: flex; justify-content: space-around; border-top: 1px solid #222; padding-top: 15px; }
        .info-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #aaa; }
        .info-item strong { color: #fff; }
        
        .badge-transmissao { background: rgba(229, 9, 20, 0.1); color: var(--primary); padding: 4px 10px; border-radius: 5px; border: 1px solid var(--primary); font-size: 11px; font-weight: bold; }
        .loader { text-align: center; padding: 50px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>PROGRAMAÇÃO ESPORTIVA</h1>
    <div class="subtitle">Onde assistir aos jogos de hoje | Inove Play</div>
    
    <div id="loading" class="loader">Carregando horários e canais...</div>
    <div id="lista-jogos"></div>
</div>

<script>
    const LINK_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRRBFFO-rVhB2NwC8gupCq--S2x_IvlgenVTE3w0OLkjibGaZXXMt-IXuA1y1XcDIAzSy7NK0tLAvN/pub?output=csv";

    async function carregarJogos() {
        try {
            const res = await fetch(LINK_CSV + "&cache=" + new Date().getTime());
            const text = await res.text();
            const linhas = text.split('\n').map(l => l.split(',').map(c => c.replace(/"/g, '').trim()));
            
            const lista = document.getElementById('lista-jogos');
            lista.innerHTML = "";

            // Começamos do 1 para pular o cabeçalho
            for (let i = 1; i < linhas.length; i++) {
                const col = linhas[i];
                
                // Se tiver pelo menos o nome dos dois times
                if (col[0] && col[1]) {
                    const card = document.createElement('div');
                    card.className = "jogo-card";
                    card.innerHTML = `
                        <div class="confronto">
                            <div class="time">${col[0]}</div>
                            <div class="vs">VS</div>
                            <div class="time">${col[1]}</div>
                        </div>
                        <div class="detalhes">
                            <div class="info-item">🕒 <strong>${col[2] || '--:--'}</strong></div>
                            <div class="info-item">📺 <span class="badge-transmissao">${col[3] || 'A DEFINIR'}</span></div>
                        </div>
                    `;
                    lista.appendChild(card);
                }
            }

            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            document.getElementById('loading').innerHTML = "Erro ao sincronizar. Verifique a planilha.";
        }
    }

    carregarJogos();
</script>
</body>
</html>
