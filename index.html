<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inove TV | Vídeo Download VIP</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0b0b0b; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 1000px; }
        .controls { background: #141414; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; border: 1px solid #222; }
        .input-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-size: 11px; color: #888; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0c1221; color: white; outline: none; box-sizing: border-box; }
        
        /* BANNER IGUAL AO DE IMAGEM */
        .banner-preview { 
            width: 340px; 
            height: 604px; 
            background-image: url('https://img.pikbest.com/backgrounds/20190423/new-movie-release-movie-theater-advertising-poster-background-image_1815063.jpg!w700wp');
            background-size: cover;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: none;
        }

        /* VÍDEO RETANGULAR */
        .video-box {
            position: absolute;
            top: 105px;
            left: 20px;
            width: 300px;
            height: 168px;
            background: #000;
            border: 2px solid #e50914;
            border-radius: 5px;
            z-index: 5;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        .txt-container { position: absolute; top: 290px; left: 20px; width: 300px; }
        .txt-melhores { font-size: 15px; font-weight: bold; margin: 0; line-height: 1.2; text-shadow: 2px 2px 4px #000; }
        .txt-aqui { color: #e50914; font-size: 18px; font-weight: bold; margin: 5px 0 0 0; text-shadow: 2px 2px 4px #000; }
        .txt-empresa { color: #e50914; font-size: 28px; font-weight: bold; margin: 0; text-transform: uppercase; line-height: 1; text-shadow: 2px 2px 4px #000; }

        .sinopse-box { position: absolute; top: 415px; left: 20px; width: 300px; height: 105px; background: rgba(15, 23, 42, 0.9); padding: 10px; border-radius: 8px; font-size: 11px; color: #cbd5e1; overflow: hidden; }
        .logo-footer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 160px; }

        .btn-download { width: 100%; padding: 15px; background: #e50914; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 15px; display: block; text-align: center; text-decoration: none; }
        #sugestoes { position: absolute; width: 100%; background: #0c1221; z-index: 100; max-height: 200px; overflow-y: auto; display: none; border: 1px solid #333; }
        .sugestao-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <h1 style="color:#e50914;">Inove Vídeo VIP</h1>

    <div class="container">
        <div class="controls">
            <div class="input-group">
                <label>Nome da Empresa</label>
                <input type="text" id="inputNomeEmpresa" value="Inove TV">
            </div>
            <div class="input-group">
                <label>Pesquisar Filme/Série</label>
                <input type="text" id="inputPesquisa" placeholder="Ex: Peaky Blinders..." autocomplete="off">
                <div id="sugestoes"></div>
            </div>
            <a href="#" class="btn-download" id="btnDownload" style="display:none;" download>📥 BAIXAR VÍDEO DO TRAILER</a>
            <p id="loadingMsg" style="display:none; color: #ffc107; font-size: 12px; margin-top: 10px;">Carregando vídeo... aguarde.</p>
        </div>

        <div class="banner-preview" id="banner">
            <div class="video-box" id="player">
                <video id="meuVideo" controls autoplay muted loop playsinline crossorigin="anonymous"></video>
            </div>
            <div class="txt-container">
                <p class="txt-melhores">Os melhores conteúdos você acompanha</p>
                <p class="txt-aqui">Aqui na</p>
                <p class="txt-empresa" id="bannerEmpresa">INOVE TV</p>
            </div>
            <div class="sinopse-box" id="bannerSinopse"></div>
            <img src="https://i.imgur.com/lhhqACi.png" class="logo-footer">
        </div>
    </div>

<script>
    const TMDB_KEY = "fe9f67e134ddc97742f522aace9f85bb";
    const videoTag = document.getElementById('meuVideo');
    const btnDownload = document.getElementById('btnDownload');

    inputPesquisa.oninput = async () => {
        const query = inputPesquisa.value;
        if (query.length < 3) return;
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`);
        const data = await res.json();
        const suggestions = document.getElementById('sugestoes');
        suggestions.innerHTML = ""; suggestions.style.display = "block";
        data.results.slice(0, 5).forEach(f => {
            const div = document.createElement('div');
            div.className = "sugestao-item";
            const img = f.poster_path ? `https://image.tmdb.org/t/p/w92${f.poster_path}` : 'https://via.placeholder.com/92x138';
            div.innerHTML = `<img src="${img}" style="width:30px; margin-right:10px;"><span>${f.title || f.name}</span>`;
            div.onclick = () => carregarVideo(f);
            suggestions.appendChild(div);
        });
    };

    async function carregarVideo(f) {
        document.getElementById('sugestoes').style.display = "none";
        document.getElementById('banner').style.display = "block";
        document.getElementById('loadingMsg').style.display = "block";
        document.getElementById('bannerEmpresa').innerText = document.getElementById('inputNomeEmpresa').value;
        document.getElementById('bannerSinopse').innerText = f.overview;

        const tipo = f.media_type || (f.title ? 'movie' : 'tv');
        const res = await fetch(`https://api.themoviedb.org/3/${tipo}/${f.id}/videos?api_key=${TMDB_KEY}&language=pt-BR`);
        const data = await res.json();
        
        let trailer = data.results.find(v => v.site === "YouTube" && v.name.toLowerCase().includes("dublado"));
        if (!trailer) trailer = data.results.find(v => v.site === "YouTube");

        if (trailer) {
            // Usando um servidor Invidious alternativo que permite download direto do MP4
            const videoId = trailer.key;
            const proxyUrl = `https://invidious.projectsegfau.lt/latest_version?id=${videoId}&itag=22`;
            
            videoTag.src = proxyUrl;
            btnDownload.href = proxyUrl;
            btnDownload.style.display = "block";
            
            videoTag.oncanplay = () => {
                document.getElementById('loadingMsg').style.display = "none";
            };
        }
    }

    inputNomeEmpresa.oninput = () => { document.getElementById('bannerEmpresa').innerText = inputNomeEmpresa.value; };
</script>
</body>
</html>
