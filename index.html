<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inove Play | Próximos Jogos</title>
    <style>
        :root { --primary: #e50914; --bg: #0b0b0b; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        h1 { color: var(--primary); text-transform: uppercase; text-align: center; letter-spacing: 2px; }
        
        .jogo-card { 
            background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #333; transition: 0.3s;
        }
        .jogo-card:hover { border-color: var(--primary); transform: scale(1.02); }
        
        .time { flex: 1; text-align: center; font-weight: bold; font-size: 16px; }
        .vs { padding: 0 15px; color: var(--primary); font-weight: 900; font-size: 14px; }
        
        .info-rodada { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; text-transform: uppercase; }
        .loader { text-align: center; padding: 50px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h1>Próximos Confrontos</h1>
    <div id="loading" class="loader">Buscando rodada atual...</div>
    <div id="lista-jogos"></div>
</div>

<script>
    const LINK_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRRBFFO-rVhB2NwC8gupCq--S2x_IvlgenVTE3w0OLkjibGaZXXMt-IXuA1y1XcDIAzSy7NK0tLAvN/pub?output=csv";

    async function carregarJogos() {
        try {
            const res = await fetch(LINK_CSV + "&t=" + new Date().getTime());
            const text = await res.text();
            const linhas = text.split('\n').map(l => l.split(',').map(c => c.replace(/"/g, '').trim()));
            
            const lista = document.getElementById('lista-jogos');
            lista.innerHTML = "";

            // O código abaixo pula as linhas de título e tenta achar onde tem " x " ou confrontos
            linhas.forEach(col => {
                if (col.length >= 2 && col[1].toLowerCase().includes('x') || col.length >= 3) {
                    // Ajuste aqui conforme a ordem que aparecer na sua planilha (Ex: Coluna A vs Coluna C)
                    const timeA = col[0];
                    const timeB = col[2] || col[1].split('x')[1] || "A definir";
                    
                    const card = document.createElement('div');
                    card.className = "jogo-card";
                    card.innerHTML = `
                        <div class="time">${timeA}</div>
                        <div class="vs">VS</div>
                        <div class="time">${timeB}</div>
                    `;
                    lista.appendChild(card);
                }
            });

            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            document.getElementById('loading').innerHTML = "Erro ao carregar jogos.";
        }
    }

    carregarJogos();
</script>
</body>
</html>
