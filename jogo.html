<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inove TV | Esportes VIP</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0b0b0b; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 1000px; }
        .controls { background: #141414; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; border: 1px solid #222; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 11px; color: #888; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0c1221; color: white; outline: none; box-sizing: border-box; }
        #listaJogos { background: #0c1221; border: 1px solid #333; border-radius: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 15px; display: none; }
        .jogo-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; font-size: 13px; }
        .jogo-item:hover { background: #25d36633; }
        .btn-buscar { width: 100%; padding: 15px; background: #25d366; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .btn-download { width: 100%; padding: 15px; background: #e50914; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        canvas { max-width: 100%; width: 340px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h1 style="color:#25d366; letter-spacing: 2px; text-transform: uppercase;">Marketing Inove Sports</h1>

    <div class="container">
        <div class="controls">
            <div class="input-group">
                <label>Campeonato</label>
                <select id="ligaId">
                    <option value="325">Brasileirão Série A 🇧🇷</option>
                    <option value="390">Brasileirão Série B 🇧🇷</option>
                    <option value="2">Champions League 🇪🇺</option>
                    <option value="17">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
                </select>
            </div>

            <button class="btn-buscar" onclick="carregarPartidas()">🔄 Buscar Jogos de Hoje</button>
            <div id="listaJogos"></div>

            <div class="input-group">
                <label>Nome da Empresa</label>
                <input type="text" id="inputEmpresa" value="Inove TV">
            </div>
            <div class="input-group">
                <label>Onde vai passar?</label>
                <input type="text" id="inputCanais" placeholder="Ex: Premiere, Globo, Star+">
            </div>
            <div class="input-group">
                <label>Cor do Banner</label>
                <select id="corDestaque">
                    <option value="#25d366">Verde Esporte</option>
                    <option value="#e50914">Vermelho Inove</option>
                    <option value="#007bff">Azul Noite</option>
                </select>
            </div>

            <button class="btn-download" id="btnDownload">Baixar Banner VIP</button>
        </div>

        <canvas id="jogoCanvas"></canvas>
    </div>

<script>
    const API_KEY = "5dd6afbd32msh17e6d58715bd39ep1a81f3jsn1308b02cc4e6";
    const canvas = document.getElementById('jogoCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1080; canvas.height = 1920;

    const LOGO_INOVE = "https://i.imgur.com/lhhqACi.png";
    const BACK_URL = "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1080";
    
    const imgInove = new Image(); imgInove.crossOrigin = "anonymous"; imgInove.src = LOGO_INOVE;
    const imgBack = new Image(); imgBack.crossOrigin = "anonymous"; imgBack.src = BACK_URL;

    let jogoAtivo = null;

    async function carregarPartidas() {
        const lista = document.getElementById('listaJogos');
        const idLiga = document.getElementById('ligaId').value;
        lista.innerHTML = "<p style='padding:10px'>Buscando...</p>";
        lista.style.display = "block";

        const d = new Date();
        const hoje = `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;

        try {
            const res = await fetch(`https://sofascore.p.rapidapi.com/matches/list-by-date?date=${hoje}`, {
                headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "sofascore.p.rapidapi.com" }
            });
            const data = await res.json();
            lista.innerHTML = "";

            const jogos = data.events.filter(e => e.tournament.uniqueTournament.id == idLiga);

            if (jogos.length === 0) {
                lista.innerHTML = "<p style='padding:10px; color: #ff4444;'>Nenhum jogo hoje.</p>";
                return;
            }

            jogos.forEach(j => {
                const div = document.createElement('div');
                div.className = "jogo-item";
                const hora = new Date(j.startTimestamp * 1000).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                div.innerHTML = `<b>${j.homeTeam.name} x ${j.awayTeam.name}</b><br><small>${j.tournament.name} - ${hora}</small>`;
                div.onclick = () => {
                    jogoAtivo = { casa: j.homeTeam.name, fora: j.awayTeam.name, hora: hora, campeonato: j.tournament.name };
                    desenhar();
                    lista.style.display = "none";
                };
                lista.appendChild(div);
            });
        } catch (e) {
            alert("Limite da API atingido. Aguarde ou use outra chave.");
        }
    }

    function desenhar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(imgBack, 0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cor = document.getElementById('corDestaque').value;
        const empresa = document.getElementById('inputEmpresa').value.toUpperCase();
        const canais = document.getElementById('inputCanais').value || "CANAIS IPTV";

        if (!jogoAtivo) {
            ctx.fillStyle = "#fff"; ctx.font = "40px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("Busque e selecione um jogo ao lado", 540, 960);
            return;
        }

        ctx.textAlign = "center";
        ctx.fillStyle = cor; ctx.font = "bold 50px sans-serif";
        ctx.fillText(jogoAtivo.campeonato.toUpperCase(), 540, 250);

        ctx.fillStyle = "#fff"; ctx.font = "bold 95px sans-serif";
        ctx.fillText(jogoAtivo.casa.toUpperCase(), 540, 520);
        ctx.fillStyle = cor; ctx.font = "italic bold 120px sans-serif";
        ctx.fillText("VS", 540, 650);
        ctx.fillStyle = "#fff"; ctx.font = "bold 95px sans-serif";
        ctx.fillText(jogoAtivo.fora.toUpperCase(), 540, 780);

        ctx.fillStyle = "rgba(255,255,255,0.07)";
        ctx.beginPath(); ctx.roundRect(100, 950, 880, 420, 40); ctx.fill();

        ctx.fillStyle = cor; ctx.font = "bold 50px sans-serif";
        ctx.fillText("HORÁRIO", 540, 1030);
        ctx.fillStyle = "#fff"; ctx.font = "bold 150px sans-serif";
        ctx.fillText(jogoAtivo.hora, 540, 1160);

        ctx.fillStyle = cor; ctx.font = "bold 50px sans-serif";
        ctx.fillText("TRANSMISSÃO", 540, 1260);
        ctx.fillStyle = "#fff"; ctx.font = "bold 65px sans-serif";
        ctx.fillText(canais, 540, 1330);

        ctx.font = "bold 50px sans-serif";
        ctx.fillText("Assista com a melhor imagem na", 540, 1580);
        ctx.fillStyle = cor; ctx.font = "bold 110px sans-serif";
        ctx.fillText(empresa, 540, 1690);

        if (imgInove.complete) ctx.drawImage(imgInove, 340, 1750, 400, 130);
    }

    document.getElementById('inputEmpresa').oninput = desenhar;
    document.getElementById('inputCanais').oninput = desenhar;
    document.getElementById('corDestaque').onchange = desenhar;
    imgBack.onload = desenhar;

    document.getElementById('btnDownload').onclick = () => {
        if(!jogoAtivo) return alert("Selecione um jogo!");
        const a = document.createElement('a');
        a.download = `Inove_Esporte_${jogoAtivo.casa}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
    };
</script>
</body>
</html>
